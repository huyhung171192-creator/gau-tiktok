<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gấu TikTok - Chốt Đơn Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; background: #1e1e1e; padding: 15px; border-radius: 10px; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: none; box-sizing: border-box; margin-bottom: 10px; background: #2c2c2c; color: white; }
        .btn-main { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-start { background-color: #4CAF50; }
        .btn-export { background-color: #2196F3; }
        #log_area { margin-bottom: 10px; color: #00ff00; font-size: 14px; }
        .comment-box { background-color: #1e1e1e; border-left: 5px solid #2196F3; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .comment-box.has-phone { border-left-color: #ff0000; background-color: #3a1c1c; }
        .comment-box.chot-roi { border-left-color: #4CAF50; background-color: #1b2e1e; }
        .user { font-weight: bold; color: #ffeb3b; font-size: 16px; }
        .text { font-size: 18px; margin: 5px 0; }
        .btn-chot { background-color: #ff9800; width: 100%; padding: 10px; font-weight: bold; margin-top: 10px; border-radius: 5px; border: none; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📱 Tool Chốt Đơn Mobile</h2>
        <input type="text" id="tiktok_id" placeholder="Nhập ID TikTok...">
        <div id="log_area">Sẵn sàng...</div>
        <button class="btn-main btn-start" onclick="startLive()">▶ VẬN CÔNG BẮT ĐẦU</button>
        <button class="btn-main btn-export" onclick="downloadHistory()">💾 XUẤT FILE EXCEL</button>
    </div>

    <div id="comments_container"></div>

    <script>
        const socket = io();
        // Lấy lịch sử cũ từ máy (nếu có)
        let history = JSON.parse(localStorage.getItem('chot_don_history') || '[]');

        function startLive() {
            let id = document.getElementById('tiktok_id').value;
            if(!id) return alert("Nhập ID đã bác!");
            socket.emit('start_live', {tiktok_id: id});
        }

        socket.on('sys_log', data => { document.getElementById('log_area').innerText = data.msg; });

        socket.on('new_comment', data => {
            let container = document.getElementById('comments_container');
            let div = document.createElement('div');
            div.className = data.has_phone ? 'comment-box has-phone' : 'comment-box';
            let id = "msg-" + Date.now();
            div.id = id;
            
            div.innerHTML = `
                <div class="user">${data.user} <small style="color:#888">${data.time}</small></div>
                <div class="text">${data.comment}</div>
                <button class="btn-chot" id="btn-${id}" onclick="saveToHistory('${id}', '${data.user}', '${data.comment}', '${data.time}')">CHỐT ĐƠN NÀY</button>
            `;
            container.prepend(div);
        });

        function saveToHistory(id, user, comment, time) {
            // Lưu vào danh sách
            history.push({ time, user, comment });
            localStorage.setItem('chot_don_history', JSON.stringify(history));
            
            // Đổi màu để bác biết đã chốt
            document.getElementById(id).classList.add('chot-roi');
            let btn = document.getElementById('btn-' + id);
            btn.innerText = "✅ ĐÃ LƯU";
            btn.style.backgroundColor = "#4CAF50";
            btn.disabled = true;
        }

        function downloadHistory() {
            if(history.length === 0) return alert("Chưa có đơn nào!");
            let csv = "\uFEFFThời gian;Khách hàng;Nội dung\n";
            history.forEach(d => { csv += `${d.time};${d.user};${d.comment}\n`; });
            
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "LichSuChotDon.csv";
            link.click();
        }
    </script>
</body>
</html>
