<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Chốt Đơn TikTok VIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 10px; overscroll-behavior: none; touch-action: pan-y; }
        .header { text-align: center; margin-bottom: 15px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border-radius: 5px; border: none; box-sizing: border-box; margin-bottom: 10px; background: #2c2c2c; color: white; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-main { flex: 1; padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-start { background-color: #4CAF50; }
        .btn-export { background-color: #2196F3; }
        .btn-clear { background-color: #d32f2f; width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 5px; color: white; margin-bottom: 10px; }
        #log_area { color: #00ff00; font-size: 13px; font-weight: bold; }
        
        .tabs { display: flex; margin-bottom: 10px; border-radius: 5px; overflow: hidden; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #333; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab.active { background: #ff9800; color: #000; }
        #history_container { display: none; }
        
        .comment-box { background-color: #1e1e1e; border-left: 5px solid #2196F3; padding: 12px; margin-top: 10px; border-radius: 5px; transition: all 0.3s ease; }
        .comment-box.has-phone { border-left-color: #ff0000; background-color: #3a1c1c; }
        .comment-box.chot-roi { border-left-color: #4CAF50 !important; background-color: #1b2e1e !important; opacity: 0.8; }
        
        /* Hiệu ứng VIP và BOOM */
        .box-vip { border-left-color: gold !important; background-color: #332b00 !important; }
        .box-boom { border-left-color: #ff4444 !important; background-color: #2b0000 !important; }
        
        .user { font-weight: bold; color: #ffeb3b; font-size: 15px; }
        .text { font-size: 16px; margin: 8px 0; line-height: 1.4; color: #eee; }
        
        /* Chỉnh lại giao diện các nút */
        .action-row { display: flex; gap: 5px; margin-top: 8px; }
        .btn-chot { background-color: #ff9800; flex: 2; padding: 10px; font-weight: bold; border-radius: 5px; border: none; color: black; cursor: pointer; }
        .btn-tag { flex: 1; font-weight: bold; background: #333; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-tag:active { background: #555; }
        
        /* Huy hiệu tag */
        .badge-vip { color: gold; font-size: 11px; border: 1px solid gold; padding: 2px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle;}
        .badge-boom { color: #ff4444; font-size: 11px; border: 1px solid #ff4444; padding: 2px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle;}
        
        .history-item { background: #2c2c2c; padding: 10px; margin-top: 5px; border-radius: 5px; border-left: 4px solid #4CAF50; font-size: 15px;}
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin:0 0 10px 0; color: #ffeb3b;">📱 TRẠM CHỐT ĐƠN VIP</h3>
        <input type="text" id="tiktok_id" placeholder="Nhập ID TikTok đang Live...">
        <div class="btn-group">
            <button class="btn-main btn-start" onclick="startLive()">▶ VẬN CÔNG</button>
            <button class="btn-main btn-export" onclick="downloadHistory()">💾 XUẤT EXCEL</button>
        </div>
        <div id="log_area">Sẵn sàng...</div>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab_live" onclick="switchTab('live')">🔴 BÌNH LUẬN</div>
        <div class="tab" id="tab_history" onclick="switchTab('history')">📦 ĐÃ LƯU (<span id="count_num">0</span>)</div>
    </div>

    <div id="comments_container"></div>

    <div id="history_container">
        <button class="btn-clear" onclick="clearHistory()">🗑️ XÓA SẠCH LỊCH SỬ</button>
        <div id="history_list"></div>
    </div>

    <script>
        let startY = 0;
        window.addEventListener('touchstart', function(e) { startY = e.touches[0].clientY; }, { passive: false });
        window.addEventListener('touchmove', function(e) {
            if (window.scrollY === 0 && e.touches[0].clientY > startY) e.preventDefault();
        }, { passive: false });

        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });

        let inputId = document.getElementById('tiktok_id');
        inputId.value = localStorage.getItem('last_tiktok_id') || '';
        inputId.addEventListener('input', function() { localStorage.setItem('last_tiktok_id', this.value); });

        const socket = io();
        let historyList = JSON.parse(localStorage.getItem('lichSuChotDon') || '[]');
        
        // --- DATA KHÁCH HÀNG (VIP / BOOM) ---
        let customerTags = JSON.parse(localStorage.getItem('phanLoaiKhach') || '{}');
        
        let msgCounter = 0; 
        updateCount();
        renderHistory();

        function updateCount() { document.getElementById('count_num').innerText = historyList.length; }

        function switchTab(tab) {
            if(tab === 'live') {
                document.getElementById('tab_live').classList.add('active');
                document.getElementById('tab_history').classList.remove('active');
                document.getElementById('comments_container').style.display = 'block';
                document.getElementById('history_container').style.display = 'none';
            } else {
                document.getElementById('tab_history').classList.add('active');
                document.getElementById('tab_live').classList.remove('active');
                document.getElementById('comments_container').style.display = 'none';
                document.getElementById('history_container').style.display = 'block';
                renderHistory();
            }
        }

        function startLive() {
            let id = inputId.value;
            if(!id) return alert("Nhập ID đã bác!");
            socket.emit('start_live', {tiktok_id: id});
        }

        socket.on('sys_log', data => { document.getElementById('log_area').innerText = data.msg; });

        socket.on('new_comment', data => {
            msgCounter++; 
            let container = document.getElementById('comments_container');
            let div = document.createElement('div');
            
            let id = "msg-" + Date.now() + "-" + msgCounter; 
            div.id = id;
            
            // Kiểm tra xem khách này có trong sổ đen hay VIP không
            let tag = customerTags[data.user];
            let extraClass = '';
            let badgeHtml = '';
            
            if (tag === 'vip') {
                extraClass = 'box-vip';
                badgeHtml = '<span class="tag-badge badge-vip">⭐ VIP</span>';
            } else if (tag === 'boom') {
                extraClass = 'box-boom';
                badgeHtml = '<span class="tag-badge badge-boom">💣 BOOM</span>';
            }

            div.className = `comment-box ${data.has_phone ? 'has-phone' : ''} ${extraClass}`;
            div.dataset.user = data.user;
            div.dataset.comment = data.comment;
            div.dataset.time = data.time;

            // Xử lý dấu nháy đơn để không gãy nút bấm JS
            let safeUser = data.user.replace(/'/g, "\\'");

            div.innerHTML = `
                <div class="user">${data.user} ${badgeHtml} <small style="float:right; color:#aaa; font-weight:normal;">${data.time}</small></div>
                <div class="text">${data.comment}</div>
                <div class="action-row">
                    <button class="btn-chot" id="btn-${id}" onclick="saveToHistory('${id}')">CHỐT ĐƠN</button>
                    <button class="btn-tag" onclick="toggleTag('${safeUser}', 'vip')">⭐ VIP</button>
                    <button class="btn-tag" onclick="toggleTag('${safeUser}', 'boom')">💣 BOOM</button>
                </div>
            `;
            container.prepend(div);
        });

        // Hàm xử lý Đánh dấu / Gỡ đánh dấu khách hàng
        function toggleTag(user, tagType) {
            // Nếu bấm lại đúng tag đó -> Gỡ bỏ tag (khách trở lại bình thường)
            if (customerTags[user] === tagType) {
                delete customerTags[user];
            } else {
                customerTags[user] = tagType; // Ghi đè thành VIP hoặc BOOM
            }
            
            // Lưu vào bộ nhớ điện thoại
            localStorage.setItem('phanLoaiKhach', JSON.stringify(customerTags));
            
            // Cập nhật giao diện TẤT CẢ bình luận đang hiện trên màn hình của khách này
            document.querySelectorAll(`.comment-box[data-user="${user}"]`).forEach(div => {
                div.classList.remove('box-vip', 'box-boom');
                let badge = div.querySelector('.tag-badge');
                if(badge) badge.remove();

                if (customerTags[user] === 'vip') {
                    div.classList.add('box-vip');
                    div.querySelector('.user').innerHTML = `${user} <span class="tag-badge badge-vip">⭐ VIP</span> <small style="float:right; color:#aaa; font-weight:normal;">${div.dataset.time}</small>`;
                } else if (customerTags[user] === 'boom') {
                    div.classList.add('box-boom');
                    div.querySelector('.user').innerHTML = `${user} <span class="tag-badge badge-boom">💣 BOOM</span> <small style="float:right; color:#aaa; font-weight:normal;">${div.dataset.time}</small>`;
                } else {
                    div.querySelector('.user').innerHTML = `${user} <small style="float:right; color:#aaa; font-weight:normal;">${div.dataset.time}</small>`;
                }
            });
        }

        function saveToHistory(id) {
            let div = document.getElementById(id);
            if(!div) return;
            
            let user = div.dataset.user;
            let comment = div.dataset.comment;
            let time = div.dataset.time;

            // Kèm luôn thông tin tag vào file Excel để sau xuất ra biết ai là VIP
            let tagInfo = customerTags[user] === 'vip' ? '[VIP] ' : (customerTags[user] === 'boom' ? '[BOOM] ' : '');

            historyList.push({ time: time, user: tagInfo + user, comment: comment });
            localStorage.setItem('lichSuChotDon', JSON.stringify(historyList));
            updateCount();
            
            div.classList.add('chot-roi');
            let btn = document.getElementById('btn-' + id);
            if(btn) {
                btn.innerText = "✅ ĐÃ LƯU";
                btn.style.backgroundColor = "#4CAF50";
                btn.style.color = "#fff";
                btn.disabled = true;
            }
        }

        function renderHistory() {
            let list = document.getElementById('history_list');
            list.innerHTML = '';
            historyList.forEach(d => {
                list.innerHTML += `
                    <div class="history-item">
                        <div style="color:#ffeb3b; font-weight:bold;">${d.user} <span style="float:right; font-size:12px; color:#aaa">${d.time}</span></div>
                        <div style="margin-top:5px; color:#ddd;">${d.comment}</div>
                    </div>
                `;
            });
        }

        function downloadHistory() {
            if(historyList.length === 0) return alert("Chưa có đơn nào!");
            let tableHTML = '<table border="1"><tr><th>Thời Gian</th><th>Tên Khách Hàng</th><th>Nội Dung Chốt</th></tr>';
            historyList.forEach(d => {
                tableHTML += `<tr><td>${d.time}</td><td>${d.user}</td><td>${d.comment}</td></tr>`;
            });
            tableHTML += '</table>';
            
            let blob = new Blob(['\ufeff' + tableHTML], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "DonHang_TikTok_" + new Date().toLocaleDateString() + ".xls";
            link.click();
        }

        function clearHistory() {
            if(confirm("Xóa toàn bộ lịch sử? Chỉ xóa khi đã xuất file nhé!")) {
                historyList = [];
                localStorage.removeItem('lichSuChotDon');
                updateCount();
                renderHistory();
            }
        }
    </script>
</body>
</html>
