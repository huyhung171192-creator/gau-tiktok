<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Chốt Đơn Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: none; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:active { background-color: #45a049; }
        #log_area { margin-top: 20px; color: #00ff00; font-size: 14px; text-align: center; }
        .comment-box { background-color: #1e1e1e; border-left: 5px solid #2196F3; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .comment-box.has-phone { border-left-color: #ff0000; background-color: #3a1c1c; } /* Đổi màu nếu có SĐT */
        .time { font-size: 12px; color: #888; }
        .user { font-weight: bold; color: #ffeb3b; font-size: 16px; margin: 5px 0; }
        .text { font-size: 18px; line-height: 1.4; }
        .btn-chot { background-color: #ff9800; margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📱 Tool Chốt Đơn</h2>
        <input type="text" id="tiktok_id" placeholder="Nhập ID TikTok...">
        <button onclick="startLive()">▶ Vận Công Bắt Comment</button>
        <div id="log_area">Chưa kết nối...</div>
    </div>

    <div id="comments_container"></div>

    <script>
        // Kết nối với Server trên máy tính
        const socket = io();

        function startLive() {
            let tiktok_id = document.getElementById('tiktok_id').value;
            if(!tiktok_id) { alert("Phải nhập ID bác ơi!"); return; }
            document.getElementById('log_area').innerText = "Đang gửi lệnh lên PC...";
            document.getElementById('comments_container').innerHTML = ""; // Xóa dữ liệu cũ
            
            // Bắn lệnh lên Python
            socket.emit('start_live', {tiktok_id: tiktok_id});
        }

        // Nhận thông báo hệ thống từ Python
        socket.on('sys_log', function(data) {
            document.getElementById('log_area').innerText = data.msg;
        });

        // Nhận Bình luận thực tế từ Python và vẽ ra màn hình
        socket.on('new_comment', function(data) {
            let container = document.getElementById('comments_container');
            let box = document.createElement('div');
            
            // Đổi class nếu có SĐT để CSS tô màu đỏ
            box.className = data.has_phone ? 'comment-box has-phone' : 'comment-box';
            
            box.innerHTML = `
                <div class="time">${data.time}</div>
                <div class="user">${data.user}</div>
                <div class="text">${data.comment}</div>
                <button class="btn-chot" onclick="this.innerHTML='✅ ĐÃ CHỐT'; this.style.backgroundColor='#4CAF50'">Chốt Đơn Khách Này</button>
            `;
            // Chèn bình luận mới nhất lên trên cùng
            container.prepend(box); 
        });
    </script>
</body>
</html>
